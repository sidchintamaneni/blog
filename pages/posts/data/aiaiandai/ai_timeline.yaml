timeline:
  - year: 2017
    month: JUN
    entries:
      - date: June 12, 2017
        headline: "Transformer architecture introduced (\"Attention Is All You Need\")"
        source: "Google Research"
        quote: "We propose a new simple network architecture, the Transformer, based solely on attention mechanisms, dispensing with recurrence and convolutions entirely."
        attribution: "Ashish Vaswani et al.; Google Research"
        color: "#d4c5b0"
        url: "https://dl.acm.org/doi/10.5555/3295222.3295349"

  - year: 2017
    month: JUL
    entries:
      - date: July 17, 2017
        headline: '"AI poses existential risk" in governor briefing'
        source: "National Governors Association meeting"
        quote: "AI poses \"existential risk\" / \"fundamental risk\" and merits proactive regulation."
        attribution: "Elon Musk; remarks at National Governors Association meeting (Rhode Island mentioned in coverage)."
        color: "#d62728"
        url: "https://www.youtube.com/watch?v=bzAXifQIUZ8"

  - year: 2018
    month: JUN
    entries:
      - date: June 11, 2018
        headline: "GPT-1: Improving Language Understanding by Generative Pre-Training"
        source: "OpenAI"
        quote: "We demonstrate that large gains on natural language tasks can be realized by generative pre-training of a language model on a diverse corpus of unlabeled text, followed by discriminative fine-tuning on each specific task."
        attribution: "Alec Radford, Karthik Narasimhan, Tim Salimans, and Ilya Sutskever; OpenAI"
        color: "#d4c5b0"
        url: "https://openai.com/index/language-unsupervised/"

  - year: 2018
    month: OCT
    entries:
      - date: October 11, 2018
        headline: "BERT pretraining popularizes bidirectional Transformer encoders"
        source: "Google"
        quote: "BERT, Bidirectional Encoder Representations from Transformers, designed to pre-train deep bidirectional representations from unlabeled text by jointly conditioning on both left and right context."
        attribution: "Jacob Devlin et al.; Google"
        color: "#d4c5b0"
        url: "https://arxiv.org/abs/1810.04805"

  - year: 2019
    month: FEB
    entries:
      - date: February 14, 2019
        headline: "GPT-2 introduced; staged release due to misuse concerns"
        source: "OpenAI"
        quote: "GPT-2 is **not being released fully initially** \"due to… concerns about malicious applications.\""
        color: "#d4c5b0"
        url: "https://openai.com/index/better-language-models/"

  - year: 2020
    month: MAR
    entries:
      - date: March 11, 2020
        headline: "WHO declares COVID-19 a pandemic"
        source: "World Health Organization"
        quote: "WHO declares COVID-19 outbreak a global pandemic, marking the first pandemic caused by a coronavirus."
        color: "#d4c5b0"
        url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC7569573/#:~:text=The%20World%20Health%20Organization%20(WHO,WHO%20Director%2DGeneral%2C%20Dr."

      - date: March 27, 2020
        headline: "CARES Act: $2.2 trillion COVID relief package"
        source: "U.S. Congress"
        quote: "President signs the Coronavirus Aid, Relief, and Economic Security (CARES) Act, providing $2.2 trillion in economic stimulus and relief measures."
        color: "#d4c5b0"
        url: "https://www.congress.gov/bill/116th-congress/house-bill/748"

  - year: 2020
    month: MAY
    entries:
      - date: May 28, 2020
        headline: "GPT-3 paper released"
        source: "OpenAI"
        quote: "\"Language Models are Few-Shot Learners\" introduces GPT-3 (175B parameters) and discusses capability and societal impacts (including difficulty distinguishing generated news from human-written in evaluations)."
        attribution: "Tom B. Brown et al.; OpenAI"
        color: "#d4c5b0"
        url: "https://arxiv.org/abs/2005.14165"

  - year: 2020
    month: JUN
    entries:
      - date: June 11, 2020
        headline: "\"We can't anticipate all consequences\" deployment caution"
        source: "OpenAI"
        quote: "The API post warns it cannot anticipate all consequences, will terminate access for harmful uses, and is launching in private beta partly for safety learning."
        color: "#d62728"
        url: "https://openai.com/index/openai-api/"

  - year: 2020
    month: NOV
    entries:
      - date: November 30, 2020
        headline: "AlphaFold CASP14 results announced"
        source: "Google DeepMind"
        quote: "DeepMind reports AlphaFold as \"a solution to a 50-year-old grand challenge\" and describes CASP14 performance, positioning AI as a major scientific accelerator."
        color: "#d4c5b0"
        url: "https://deepmind.google/blog/alphafold-a-solution-to-a-50-year-old-grand-challenge-in-biology/"

  - year: 2021
    month: JUN
    entries:
      - date: June 29, 2021
        headline: "GitHub Copilot technical preview"
        source: "GitHub"
        quote: "GitHub launches Copilot preview: \"your AI pair programmer\" (early mass-market code-generation tooling)."
        color: "#d4c5b0"
        url: "https://github.blog/news-insights/product-news/introducing-github-copilot-ai-pair-programmer/"

  - year: 2021
    month: AUG
    entries:
      - date: August 10, 2021
        headline: "OpenAI Codex (natural language to code) via API private beta"
        source: "OpenAI"
        quote: "OpenAI releases Codex via API private beta; post states it translates natural language to code and references Copilot as a powered product."
        attribution: "OpenAI (authors listed on post)"
        color: "#d4c5b0"
        url: "https://openai.com/index/openai-codex/"

  - year: 2022
    month: JAN
    entries:
      - date: January 28, 2022
        headline: "Chain-of-thought prompting paper"
        source: "Google"
        quote: "Paper finds \"chain-of-thought prompting\" can improve reasoning performance of sufficiently large LMs (notably on math/logic style tasks)."
        attribution: "Jason Wei et al.; Google"
        color: "#d4c5b0"
        url: "https://arxiv.org/abs/2201.11903"

  - year: 2022
    month: MAR
    entries:
      - date: March 4, 2022
        headline: "InstructGPT / RLHF paper"
        source: "OpenAI"
        quote: "OpenAI shows instruction-following improvements via RLHF, noting user-preference wins vs a much larger baseline in evaluations."
        attribution: "Long Ouyang et al.; OpenAI"
        color: "#d4c5b0"
        url: "https://arxiv.org/abs/2203.02155"

  - year: 2022
    month: APR
    entries:
      - date: April 6, 2022
        headline: "DALL·E 2 research launch (text-to-image step change)"
        source: "Sam Altman (OpenAI)"
        quote: "Research launch announcement: DALL·E 2 creates/edits images from natural language; described as a major capability leap in generative media."
        attribution: "Sam Altman (OpenAI)"
        color: "#d4c5b0"
        url: "https://blog.samaltman.com/dall-star-e-2"

  - year: 2022
    month: JUN
    entries:
      - date: June 11, 2022
        headline: 'LaMDA "sentience" claim goes public'
        source: "Google (Responsible AI)"
        quote: "A Google engineer claims LaMDA has \"come to life\" / is sentient (exact transcripts are contested; the claim itself is the salient prediction about AI personhood)."
        attribution: "Blake Lemoine (Google; Responsible AI at the time)"
        color: "#d62728"
        url: "https://www.washingtonpost.com/technology/2022/06/11/google-ai-lamda-blake-lemoine/"

  - year: 2022
    month: AUG
    entries:
      - date: August 22, 2022
        headline: "Stable Diffusion public release"
        source: "Stability AI"
        quote: "Public release of Stable Diffusion and DreamStudio Lite; emphasizes \"safe and ethical release.\""
        color: "#d4c5b0"
        url: "https://stability.ai/news/stable-diffusion-public-release"

  - year: 2022
    month: NOV
    entries:
      - date: November 30, 2022
        headline: "ChatGPT research preview released"
        source: "OpenAI"
        quote: "OpenAI launches ChatGPT, describing conversational interaction and RLHF-based training; becomes key inflection point for public adoption."
        color: "#d4c5b0"
        url: "https://openai.com/index/chatgpt/"

  - year: 2023
    month: FEB
    entries:
      - date: February 27, 2023
        headline: "LLaMA paper released (open-ish weights era)"
        source: "Meta AI"
        quote: "LLaMA paper describes foundation models (7B–65B) trained on public datasets; positioned as efficient and competitive."
        attribution: "Hugo Touvron et al.; Meta AI"
        color: "#d4c5b0"
        url: "https://arxiv.org/abs/2302.13971"

  - year: 2023
    month: MAR
    entries:
      - date: March 2023
        headline: '"Pause giant AI experiments" letter'
        source: "Future of Life Institute"
        quote: "Open letter calls for a **pause** (commonly described as \"at least 6 months\") on training frontier systems beyond then-current capability thresholds; details and signatories on source page."
        attribution: "Future of Life Institute (open letter)"
        color: "#d62728"
        url: "https://futureoflife.org/open-letter/pause-giant-ai-experiments/"

      - date: March 14, 2023
        headline: "GPT-4 publicly released by OpenAI"
        source: "OpenAI"
        quote: "OpenAI describes GPT-4 as \"large multimodal,\" citing benchmark performance like top-10% simulated bar exam (per their release post)."
        attribution: "OpenAI"
        color: "#d4c5b0"
        url: "https://openai.com/index/gpt-4-research/"

      - date: March 14, 2023
        headline: "Claude 1 introduced"
        source: "Anthropic"
        quote: "First public model by Anthropic - a next-generation AI assistant based on research into training helpful, honest, and harmless AI systems."
        color: "#d4c5b0"
        url: "https://www.anthropic.com/news/introducing-claude"

  - year: 2023
    month: MAY
    entries:
      - date: May 16, 2023
        headline: 'Senate hearing: "significant harm" downside case'
        source: "U.S. Senate Judiciary subcommittee"
        quote: "\"My worst fears are that … [the field] cause significant harm to the world… if this technology goes wrong, it can go quite wrong.\""
        attribution: "Sam Altman; testimony to U.S. Senate Judiciary subcommittee (transcript outlet)"
        color: "#d62728"
        url: "https://techpolicy.press/transcript-senate-judiciary-subcommittee-hearing-on-oversight-of-ai/"

      - date: May 2023
        headline: '"Risk of extinction" consensus statement'
        source: "Center for AI Safety"
        quote: "Statement: \"Mitigating the risk of extinction from AI should be a global priority…\" (short excerpt)."
        color: "#d62728"
        url: "https://www.safe.ai/statement-on-ai-risk"

  - year: 2023
    month: JUL
    entries:
      - date: July 11, 2023
        headline: "Claude 2 introduced"
        source: "Anthropic"
        quote: "Improved performance with longer responses (100K tokens), accessible via API and claude.ai. Scored 76.5% on Bar exam and 71.2% on Codex HumanEval."
        color: "#d4c5b0"
        url: "https://www.anthropic.com/news/claude-2"

  - year: 2023
    month: OCT
    entries:
      - date: October 30, 2023
        headline: "U.S. executive order on AI"
        source: "Federal Register"
        quote: "Executive Order: \"Safe, Secure, and Trustworthy Development and Use of Artificial Intelligence.\""
        color: "#d4c5b0"
        url: "https://www.federalregister.gov/documents/2023/11/01/2023-24283/safe-secure-and-trustworthy-development-and-use-of-artificial-intelligence"

  - year: 2023
    month: NOV
    entries:
      - date: November 1-2, 2023
        headline: "Bletchley Declaration"
        source: "UK Government / AI Safety Summit"
        quote: "UK-hosted AI Safety Summit outputs the \"Bletchley Declaration\" (baseline international framing around frontier AI risk and cooperation)."
        attribution: "UK Government / summit participants"
        color: "#d4c5b0"
        url: "https://www.gov.uk/government/publications/ai-safety-summit-2023-the-bletchley-declaration/the-bletchley-declaration-by-countries-attending-the-ai-safety-summit-1-2-november-2023"

      - date: November 17, 2023
        headline: "Sam Altman fired as OpenAI CEO"
        source: "OpenAI"
        quote: "OpenAI board abruptly removed CEO Sam Altman, citing loss of confidence in his leadership. The decision shocked the tech industry and sparked immediate backlash from employees and investors."
        color: "#d4c5b0"
        url: "https://openai.com/blog/openai-announces-leadership-transition"

      - date: November 22, 2023
        headline: "Sam Altman reinstated as OpenAI CEO"
        source: "OpenAI"
        quote: "After days of turmoil, employee revolt, and pressure from investors including Microsoft (which offered Altman a job leading AI research), OpenAI's board reinstated Sam Altman as CEO with a new board structure."
        color: "#d4c5b0"
        url: "https://openai.com/blog/sam-altman-returns-as-ceo-openai-has-a-new-initial-board"

  - year: 2023
    month: DEC
    entries:
      - date: December 6, 2023
        headline: "Gemini announced"
        source: "Google"
        quote: "Gemini is a \"multimodal\" model family (Ultra/Pro/Nano)."
        color: "#d4c5b0"
        url: "https://blog.google/innovation-and-ai/technology/ai/google-gemini-ai/"

  - year: 2024
    month: FEB
    entries:
      - date: February 15, 2024
        headline: "Gemini 1.5 announced"
        source: "Google"
        quote: "Gemini 1.5 with long-context capabilities and a new MoE architecture."
        attribution: "Sundar Pichai and Demis Hassabis; Google"
        color: "#d4c5b0"
        url: "https://blog.google/innovation-and-ai/products/google-gemini-next-generation-model-february-2024/"

      - date: February 15, 2024
        headline: "Sora introduced"
        source: "OpenAI"
        quote: "Sora text-to-video model."
        color: "#d4c5b0"
        url: "https://openai.com/index/sora/"

  - year: 2024
    month: MAR
    entries:
      - date: March 4, 2024
        headline: "Claude 3 family introduced"
        source: "Anthropic"
        quote: "Three state-of-the-art models—Claude 3 Opus, Sonnet, and Haiku—set new industry benchmarks across reasoning, math, coding, multilingual understanding, and vision."
        color: "#d4c5b0"
        url: "https://www.anthropic.com/news/claude-3-family"

  - year: 2024
    month: APR
    entries:
      - date: April 18, 2024
        headline: "Meta Llama 3 released"
        source: "Meta"
        quote: "Meta releases Llama 3 models (8B and 70B) as \"openly available\" family, with responsible-use framing."
        color: "#d4c5b0"
        url: "https://ai.meta.com/blog/meta-llama-3/"

  - year: 2024
    month: MAY
    entries:
      - date: May 13, 2024
        headline: "GPT-4o (\"Omni\") announced"
        source: "OpenAI"
        quote: "GPT-4o as real-time multimodal (audio/vision/text) flagship model."
        color: "#d4c5b0"
        url: "https://openai.com/index/hello-gpt-4o/"

      - date: May 21, 2024
        headline: "EU AI Act formally adopted (Council)"
        source: "Council of the European Union"
        quote: "AI Act was formally adopted May 21, 2024 and entered into force August 1, 2024."
        color: "#d4c5b0"
        url: "https://www.consilium.europa.eu/en/policies/artificial-intelligence/"

  - year: 2024
    month: JUN
    entries:
      - date: June 21, 2024
        headline: "Claude 3.5 Sonnet introduced"
        source: "Anthropic"
        quote: "Enhanced speed and accuracy, outperforming competitor models with the speed and cost of Claude 3 Sonnet. Sets new benchmarks for graduate-level reasoning, coding proficiency."
        color: "#d4c5b0"
        url: "https://www.anthropic.com/news/claude-3-5-sonnet"

  - year: 2024
    month: SEP
    entries:
      - date: September 12, 2024
        headline: "OpenAI o1-preview (reasoning emphasis)"
        source: "OpenAI"
        quote: "\"o1-preview\" models designed to \"spend more time thinking before they respond.\""
        color: "#d4c5b0"
        url: "https://openai.com/index/introducing-openai-o1-preview/"

      - date: September 23, 2024
        headline: "Superintelligence in a few thousand days"
        source: "Sam Altman"
        quote: "\"It is possible that we will have superintelligence in a few thousand days (!); it may take longer, but I'm confident we'll get there.\""
        color: "#d62728"
        url: "https://ia.samaltman.com/"

  - year: 2024
    month: OCT
    entries:
      - date: October 8, 2024
        headline: "Nobel Prize in Physics awarded to John J. Hopfield and Geoffrey Hinton for AI foundations"
        source: "The Nobel Prize"
        quote: "John J. Hopfield and Geoffrey Hinton awarded the Nobel Prize in Physics \"for foundational discoveries and inventions that enable machine learning with artificial neural networks.\""
        color: "#d4c5b0"
        url: "https://www.nobelprize.org/prizes/physics/2024/press-release/"

  - year: 2025
    month: JAN
    entries:
      - date: January 5, 2025
        headline: "We know how to build AGI; agents join workforce"
        source: "Sam Altman"
        quote: "\"We are now confident we know how to build AGI…\" and predicts that \"in 2025\" AI agents may \"join the workforce\" and materially change output."
        color: "#d62728"
        url: "https://blog.samaltman.com/reflections"

      - date: January 20, 2025
        headline: "US has a new president"
        source: "The White House"
        quote: "Donald Trump inaugurated as 47th US President."
        color: "#d4c5b0"
        url: "https://www.whitehouse.gov/"

      - date: January 20, 2025
        headline: "DeepSeek-R1: Incentivizing Reasoning Capability in LLMs via Reinforcement Learning"
        source: "DeepSeek"
        quote: "R1 reasoning model with training costs of approximately $5-6 million - significantly disrupting cost expectations for frontier AI models."
        color: "#d4c5b0"
        url: "https://arxiv.org/abs/2501.12948"

      - date: January 21, 2025
        headline: "$500B Stargate AI infrastructure project announced"
        source: "OpenAI / White House"
        quote: "President Trump announced the Stargate Project, a joint venture between OpenAI, SoftBank, Oracle, and MGX to invest up to $500 billion in AI infrastructure in the US by 2029. The initiative will deploy $100 billion immediately and create 100,000 jobs."
        color: "#d4c5b0"
        url: "https://openai.com/index/announcing-the-stargate-project/"

      - date: January 23, 2025
        headline: "Computer-Using Agent (CUA) research release"
        source: "OpenAI"
        quote: "\"Universal interface\" (Computer-Using Agent) powering Operator."
        color: "#d4c5b0"
        url: "https://openai.com/index/computer-using-agent/"

      - date: January 23, 2025
        headline: 'Regulatory reversal: EO "removing barriers"'
        source: "The White House"
        quote: "Executive order \"to uphold America's global AI dominance\" and explicitly revokes EO 14110 (Biden-era AI EO)."
        color: "#d4c5b0"
        url: "https://www.whitehouse.gov/presidential-actions/2025/01/removing-barriers-to-american-leadership-in-artificial-intelligence/"

      - date: January 31, 2025
        headline: "o3-mini released"
        source: "OpenAI"
        quote: "o3-mini as cost-efficient reasoning model available in ChatGPT and API."
        color: "#d4c5b0"
        url: "https://openai.com/index/openai-o3-mini/"

  - year: 2025
    month: FEB
    entries:
      - date: February 2, 2025
        headline: "Deep research introduced"
        source: "OpenAI"
        quote: "Deep research: multi-step web research producing sourced reports; later integrated with agent mode."
        color: "#d4c5b0"
        url: "https://openai.com/index/introducing-deep-research/"

      - date: February 24, 2025
        headline: "Claude 3.7 Sonnet and Claude Code introduced"
        source: "Anthropic"
        quote: "Claude 3.7 as first hybrid reasoning model, Claude Code as agentic coding tool that can search/read code, edit files, write/run tests."
        color: "#d4c5b0"
        url: "https://www.anthropic.com/news/claude-3-7-sonnet"

  - year: 2025
    month: APR
    entries:
      - date: April 16, 2025
        headline: "o3 and o4-mini released"
        source: "OpenAI"
        quote: "o3 and o4-mini reasoning models; later update notes o3-pro availability."
        color: "#d4c5b0"
        url: "https://openai.com/index/introducing-o3-and-o4-mini/"

      - date: April 2025
        headline: "Microsoft and AWS pause datacenter expansion"
        source: "Microsoft / AWS"
        quote: "Microsoft froze 1.5GW of self-build datacenter projects and walked away from 2GW+ of non-binding contracts, completely freezing new leasing activity. AWS paused discussions on colocated datacenters, particularly abroad. Both cited strategic reallocation amid fast-moving AI advancements rather than reduced demand."
        color: "#d62728"
        url: "https://www.cnbc.com/2025/04/27/ai-data-center-boom-isnt-going-bust-but-the-pause-is-trending.html"

  - year: 2025
    month: MAY
    entries:
      - date: May 7, 2025
        headline: "Microsoft reports 20-30% of code AI-generated"
        source: "LlamaCon 2025"
        quote: "20 to 30% of code in Microsoft repositories is now written by AI."
        attribution: "Satya Nadella; Microsoft"
        color: "#d62728"
        url: "https://www.youtube.com/watch?v=WaJOONFllLc"

      - date: May 22, 2025
        headline: "Claude 4 family introduced"
        source: "Anthropic"
        quote: "Claude Opus 4 and Claude Sonnet 4 set new standards for coding, advanced reasoning, and AI agents. Both models can use tools during extended thinking and in parallel."
        color: "#d4c5b0"
        url: "https://www.anthropic.com/news/claude-4"

      - date: May 28, 2025
        headline: "White-collar unemployment warning"
        source: "Axios interview"
        quote: "Axios reports Amodei warning: AI could \"wipe out half of all entry-level white-collar jobs\" and push unemployment to \"10–20%\" in \"1 to 5 years\" (reported summary of interview)."
        attribution: "Dario Amodei; Anthropic (Axios interview)"
        color: "#d62728"
        url: "https://www.axios.com/2025/05/28/ai-jobs-white-collar-unemployment-anthropic"

  - year: 2025
    month: JUN
    entries:
      - date: June 4, 2025
        headline: "AGI probability framing"
        source: "Wired"
        quote: "Wired quotes Hassabis: \"In the next five to 10 years, there's maybe a 50 percent chance that we'll have what we define as AGI.\""
        attribution: "Demis Hassabis; Google DeepMind"
        color: "#d62728"
        url: "https://www.wired.com/story/google-deepminds-ceo-demis-hassabis-thinks-ai-will-make-humans-less-selfish/"

  - year: 2025
    month: JUL
    entries:
      - date: July 17, 2025
        headline: "ChatGPT agent integrates Operator + deep research"
        source: "OpenAI"
        quote: "ChatGPT agent with Operator integration; release notes frame an \"agent mode\" toolbox."
        color: "#d4c5b0"
        url: "https://openai.com/index/introducing-chatgpt-agent/"

  - year: 2025
    month: AUG
    entries:
      - date: August 7, 2025
        headline: "GPT-5 introduced"
        source: "OpenAI"
        quote: "GPT-5 as a \"unified system\" with routing between fast and \"thinking\" variants."
        color: "#d4c5b0"
        url: "https://openai.com/index/introducing-gpt-5/"

      - date: August 27, 2025
        headline: "Cross-lab evaluation: OpenAI–Anthropic joint safety evaluation"
        source: "OpenAI & Anthropic"
        quote: "OpenAI and Anthropic publish findings from a joint safety/misalignment evaluation where each ran internal tests on the other's released models."
        color: "#d4c5b0"
        url: "https://openai.com/index/openai-anthropic-safety-evaluation/"

  - year: 2025
    month: SEP
    entries:
      - date: September 30, 2025
        headline: "Claude Sonnet 4.5 introduced"
        source: "Anthropic"
        quote: "Best coding model in the world, strongest model for building complex agents, best model at using computers, with substantial gains in reasoning and math."
        color: "#d4c5b0"
        url: "https://www.anthropic.com/news/claude-sonnet-4-5"

  - year: 2025
    month: NOV
    entries:
      - date: November 24, 2025
        headline: "Claude Opus 4.5 introduced"
        source: "Anthropic"
        quote: "Most intelligent model combining maximum capability with practical performance. Handles long-horizon coding tasks more efficiently, using up to 65% fewer tokens."
        color: "#d4c5b0"
        url: "https://www.anthropic.com/news/claude-opus-4-5"

  - year: 2025
    month: DEC
    entries:
      - date: December 11, 2025
        headline: "GPT-5.2 introduced (work + agents positioning)"
        source: "OpenAI"
        quote: "GPT-5.2 emphasizing professional knowledge work and long-running agents; accompanying system card update notes continuity of mitigation approach."
        color: "#d4c5b0"
        url: "https://openai.com/index/introducing-gpt-5-2/"

      - date: December 18, 2025
        headline: "GPT-5.2-Codex introduced"
        source: "OpenAI"
        quote: "GPT-5.2-Codex as \"agentic coding\" model; positioned for professional software engineering."
        color: "#d4c5b0"
        url: "https://openai.com/index/introducing-gpt-5-2-codex/"

  - year: 2026
    month: JAN
    entries:
      - date: January 12, 2026
        headline: "Cowork introduced"
        source: "Anthropic"
